  }

  .quiz-box {
    background: #0f172a;              /* dark slate blue */

    padding: 25px;
    border-radius: 12px;

  }

  h1 {
    text-align: center;

    color: #e0e7ff;
  }

  .counter {
    text-align: center;
    font-size: 14px;
    color: #a5b4fc;                   /* soft purple-blue */

  }

  .question {
    font-size: 18px;
    margin-bottom: 15px;
    color: #f1f5f9;
    white-space: pre-wrap;
    font-family: Consolas, monospace;
  }

  .options button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #1e293b;              /* option background */
    border: none;
    border-radius: 8px;
    color: #e5e7eb;
    text-align: left;
    cursor: pointer;
    font-size: 15px;
  }

  .options button:hover {
    background: #334155;
  }

  .options button.correct {
    background: #22c55e;
    color: white;
  }

  .options button.wrong {
    background: #e11d48;
    color: white;
  }

  .nav-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .nav-buttons button {
    flex: 1;
    padding: 12px;
    background: #4f46e5;              /* indigo primary */
    border: none;
    border-radius: 8px;
    color: #eef2ff;
    font-size: 16px;
    cursor: pointer;
  }

  .nav-buttons button:disabled {
    background: #475569;
    cursor: not-allowed;
  }

  .nav-buttons button:hover:not(:disabled) {
    background: #6366f1;
  }

  .restart-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #7c3aed;              /* purple restart */
    border: none;
    border-radius: 8px;
    color: #f5f3ff;
    font-size: 16px;
    cursor: pointer;
  }

  .restart-btn:hover {
    background: #8b5cf6;
  }

  .result {
    text-align: center;
    font-size: 18px;
    margin-top: 20px;
    color: #e0e7ff;
  }
</style>
</head>

  a: 2
},
{
  q: "What is the output?\n\n#include <iostream>\nusing namespace std;\nint main(){\n int x = 1;\n while(x < 4){\n  cout << x;\n  x++;\n }\n return 0;\n}",
  o: [
    "123",
    "0123",
    "1234",
    "321"
  ],
  a: 0
},
{
  q: "Which of the following correctly declares an array of 5 integers?",
  o: [
    "int arr(5);",
    "int arr[5];",
    "array int arr[5];",
    "int[5] arr;"
  ],
  a: 1
},
{
  q: "Which statement about constructors is true?",
  o: [
    "They must have return type void",
    "They have same name as class",
    "They cannot be overloaded",
    "They are optional and never called automatically"
  ],
  a: 1
},
{
  q: "Which of the following is used to terminate a loop immediately?",
  o: [
    "continue",
    "stop",
    "exit",
    "break"
  ],
  a: 3
}
];

let current = 0;
let score = 0;

// ✅ Pick 60 random questions WITHOUT modifying quizData
function pickRandomQuestions(bank, count) {
  const copy = [...bank];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, count);
}

const examData = pickRandomQuestions(quizData, 60);

let answers = new Array(examData.length).fill(null);
let shuffledOptions = new Array(examData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const counterEl = document.getElementById("counter");
const resultEl = document.getElementById("result");

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function loadQuestion() {
  const q = examData[current];

  counterEl.textContent = `Question ${current + 1} of ${examData.length}`;
  questionEl.textContent = q.q;
  optionsEl.innerHTML = "";

  prevBtn.disabled = current === 0;

  let optionsToRender;

  if (shuffledOptions[current] === null) {
    optionsToRender = q.o.map((text, index) => ({
      text,
      originalIndex: index
    }));

    shuffleArray(optionsToRender);
    shuffledOptions[current] = optionsToRender;
  } else {
    optionsToRender = shuffledOptions[current];
  }

  optionsToRender.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt.text;

    if (answers[current] !== null) {
      btn.disabled = true;

      if (opt.originalIndex === q.a) {
        btn.classList.add("correct");
      }

      if (
        opt.originalIndex === answers[current] &&
        answers[current] !== q.a
      ) {
        btn.classList.add("wrong");
      }
    }

    btn.onclick = () => selectAnswer(opt.originalIndex);
    optionsEl.appendChild(btn);
  });
}

function selectAnswer(index) {
  if (answers[current] !== null) return;

  answers[current] = index;
  if (index === examData[current].a) score++;

  loadQuestion();
}

nextBtn.onclick = () => {
  if (current < examData.length - 1) {
    current++;
    loadQuestion();
  } else {
    showResult();
  }
};

prevBtn.onclick = () => {
  if (current > 0) {
    current--;
    loadQuestion();
  }
};

function showResult() {
  questionEl.style.display = "none";
  optionsEl.style.display = "none";
  counterEl.style.display = "none";
  document.querySelector(".nav-buttons").style.display = "none";

  const percentage = ((score / examData.length) * 100).toFixed(2);
  resultEl.style.display = "block";
  restartBtn.style.display ="block";

  resultEl.innerHTML = `
    <p><strong>Quiz Completed</strong></p>
    <p>Score: ${score} / ${examData.length}</p>
    <p>Percentage: ${percentage}%</p>
  `;
}

restartBtn.onclick = () => {
  current = 0;
  score = 0;

  const newExamData = pickRandomQuestions(quizData, 60);
  examData.length = 0;
  examData.push(...newExamData);

  answers = new Array(examData.length).fill(null);
  shuffledOptions = new Array(examData.length).fill(null);

  questionEl.style.display = "block";
  optionsEl.style.display = "block";
  counterEl.style.display = "block";
  document.querySelector(".nav-buttons").style.display = "flex";
  resultEl.style.display = "none";
  restartBtn.style.display = "none";

  prevBtn.disabled = true;
  nextBtn.disabled = false;

  loadQuestion();
};

loadQuestion();
</script>
